<svg viewBox="0 0 520 480" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Glows -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowSoft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowStrong" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Gradients -->
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f8ef7"/>
      <stop offset="100%" stop-color="#2563c7"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2dd4a0"/>
      <stop offset="100%" stop-color="#1aab7f"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <linearGradient id="flowLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4f8ef7" stop-opacity="0"/>
      <stop offset="50%" stop-color="#4f8ef7" stop-opacity="1"/>
      <stop offset="100%" stop-color="#2dd4a0" stop-opacity="0"/>
    </linearGradient>

    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4f8ef7" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#4f8ef7" stop-opacity="0"/>
    </radialGradient>

    <!-- Clip for rounded rects -->
    <clipPath id="screenClip">
      <rect x="0" y="0" width="60" height="42" rx="4"/>
    </clipPath>
  </defs>

  <!-- Background ambient glow -->
  <ellipse cx="260" cy="240" rx="220" ry="200" fill="url(#centerGlow)">
    <animate attributeName="rx" values="220;240;220" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="ry" values="200;220;200" dur="6s" repeatCount="indefinite"/>
  </ellipse>

  <!-- ===== MESSY SIDE (Left - Tangled) ===== -->
  <!-- Tangled paths - chaotic connections -->
  <g opacity="0.25">
    <path d="M60,120 C100,80 80,200 120,160 S90,280 130,240" fill="none" stroke="#fb923c" stroke-width="1.5" stroke-dasharray="4,4">
      <animate attributeName="stroke-dashoffset" from="0" to="-16" dur="3s" repeatCount="indefinite"/>
    </path>
    <path d="M40,180 C90,140 50,260 100,220 S80,320 120,290" fill="none" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="4,4">
      <animate attributeName="stroke-dashoffset" from="0" to="-16" dur="4s" repeatCount="indefinite"/>
    </path>
    <path d="M70,250 C110,200 60,160 110,140 S90,100 130,110" fill="none" stroke="#f87171" stroke-width="1.5" stroke-dasharray="4,4">
      <animate attributeName="stroke-dashoffset" from="0" to="-16" dur="3.5s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Scattered disconnected nodes (messy) -->
  <g opacity="0.5">
    <!-- Scattered docs/items -->
    <rect x="35" y="105" width="30" height="22" rx="4" fill="none" stroke="#fb923c" stroke-width="1" opacity="0.6" transform="rotate(-12, 50, 116)"/>
    <rect x="80" y="150" width="30" height="22" rx="4" fill="none" stroke="#a78bfa" stroke-width="1" opacity="0.6" transform="rotate(8, 95, 161)"/>
    <rect x="25" y="210" width="30" height="22" rx="4" fill="none" stroke="#f87171" stroke-width="1" opacity="0.6" transform="rotate(-5, 40, 221)"/>
    <rect x="90" y="260" width="30" height="22" rx="4" fill="none" stroke="#fb923c" stroke-width="1" opacity="0.6" transform="rotate(15, 105, 271)"/>
    <rect x="50" y="300" width="30" height="22" rx="4" fill="none" stroke="#a78bfa" stroke-width="1" opacity="0.6" transform="rotate(-8, 65, 311)"/>
    <!-- Warning symbols -->
    <text x="55" y="120" font-size="10" fill="#fb923c" opacity="0.5">⚠</text>
    <text x="100" y="168" font-size="10" fill="#a78bfa" opacity="0.5">✕</text>
    <text x="40" y="228" font-size="10" fill="#f87171" opacity="0.5">⚠</text>
  </g>

  <!-- "BEFORE" label -->
  <text x="65" y="80" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10" font-weight="600" fill="#8a909c" letter-spacing="1.5" text-anchor="middle" opacity="0.6">BEFORE</text>

  <!-- ===== TRANSFORMATION ARROW (Center) ===== -->
  <!-- Central processing hub -->
  <g transform="translate(260, 240)">
    <!-- Outer ring - rotating -->
    <circle cx="0" cy="0" r="52" fill="none" stroke="url(#blueGrad)" stroke-width="1.5" stroke-dasharray="8,6" opacity="0.4">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="20s" repeatCount="indefinite"/>
    </circle>
    <!-- Middle ring -->
    <circle cx="0" cy="0" r="40" fill="none" stroke="url(#blueGrad)" stroke-width="1" opacity="0.3">
      <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="15s" repeatCount="indefinite"/>
    </circle>
    <!-- Core circle -->
    <circle cx="0" cy="0" r="28" fill="#0d0f12" stroke="url(#blueGrad)" stroke-width="2" filter="url(#glow)"/>
    <!-- SI logo/icon in center -->
    <text x="0" y="1" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="13" font-weight="700" fill="#4f8ef7" text-anchor="middle" dominant-baseline="middle">SI</text>
    <!-- Pulsing ring -->
    <circle cx="0" cy="0" r="28" fill="none" stroke="#4f8ef7" stroke-width="1" opacity="0">
      <animate attributeName="r" values="28;55" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="0" r="28" fill="none" stroke="#4f8ef7" stroke-width="1" opacity="0">
      <animate attributeName="r" values="28;55" dur="2.5s" begin="1.25s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0" dur="2.5s" begin="1.25s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Flow lines: Left mess → Center hub -->
  <g opacity="0.6">
    <path d="M120,130 Q180,160 215,225" fill="none" stroke="url(#flowLine)" stroke-width="1.5">
      <animate attributeName="stroke-dashoffset" from="80" to="0" dur="2s" repeatCount="indefinite"/>
    </path>
    <path d="M120,220 Q170,230 215,238" fill="none" stroke="url(#flowLine)" stroke-width="1.5">
      <animate attributeName="stroke-dashoffset" from="60" to="0" dur="1.8s" repeatCount="indefinite"/>
    </path>
    <path d="M120,310 Q180,290 218,255" fill="none" stroke="url(#flowLine)" stroke-width="1.5">
      <animate attributeName="stroke-dashoffset" from="80" to="0" dur="2.2s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Flow lines: Center hub → Right clean nodes -->
  <g opacity="0.8">
    <!-- To top-right node -->
    <path d="M305,225 Q340,170 370,145" fill="none" stroke="#2dd4a0" stroke-width="1.5" stroke-dasharray="4,4">
      <animate attributeName="stroke-dashoffset" from="0" to="-16" dur="1.5s" repeatCount="indefinite"/>
    </path>
    <!-- To mid-right node -->
    <path d="M308,240 Q350,240 380,240" fill="none" stroke="#2dd4a0" stroke-width="1.5" stroke-dasharray="4,4">
      <animate attributeName="stroke-dashoffset" from="0" to="-16" dur="1.5s" repeatCount="indefinite"/>
    </path>
    <!-- To bottom-right node -->
    <path d="M305,258 Q340,310 370,335" fill="none" stroke="#2dd4a0" stroke-width="1.5" stroke-dasharray="4,4">
      <animate attributeName="stroke-dashoffset" from="0" to="-16" dur="1.5s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- ===== CLEAN SIDE (Right - Organized) ===== -->
  <!-- "AFTER" label -->
  <text x="435" y="80" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10" font-weight="600" fill="#2dd4a0" letter-spacing="1.5" text-anchor="middle" opacity="0.7">AFTER</text>

  <!-- Clean Node 1: Workflow/Process -->
  <g transform="translate(390, 115)" filter="url(#glow)">
    <rect x="0" y="0" width="90" height="60" rx="10" fill="#13161b" stroke="#2dd4a0" stroke-width="1.5"/>
    <!-- Mini flowchart inside -->
    <circle cx="20" cy="18" r="5" fill="none" stroke="#2dd4a0" stroke-width="1" opacity="0.8"/>
    <line x1="25" y1="18" x2="40" y2="18" stroke="#2dd4a0" stroke-width="1" opacity="0.5"/>
    <rect x="40" y="13" width="12" height="10" rx="2" fill="none" stroke="#2dd4a0" stroke-width="1" opacity="0.8"/>
    <line x1="52" y1="18" x2="65" y2="18" stroke="#2dd4a0" stroke-width="1" opacity="0.5"/>
    <circle cx="70" cy="18" r="5" fill="none" stroke="#2dd4a0" stroke-width="1" opacity="0.8"/>
    <text x="45" y="44" font-family="-apple-system, sans-serif" font-size="8" fill="#2dd4a0" text-anchor="middle" opacity="0.8">Workflow</text>
    <!-- Pulse -->
    <rect x="0" y="0" width="90" height="60" rx="10" fill="none" stroke="#2dd4a0" stroke-width="1" opacity="0">
      <animate attributeName="opacity" values="0;0.4;0" dur="3s" begin="0s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Clean Node 2: Database/Airtable -->
  <g transform="translate(395, 210)" filter="url(#glow)">
    <rect x="0" y="0" width="90" height="60" rx="10" fill="#13161b" stroke="#4f8ef7" stroke-width="1.5"/>
    <!-- Mini table/grid inside -->
    <line x1="15" y1="15" x2="75" y2="15" stroke="#4f8ef7" stroke-width="1" opacity="0.5"/>
    <line x1="15" y1="25" x2="75" y2="25" stroke="#4f8ef7" stroke-width="0.8" opacity="0.3"/>
    <line x1="15" y1="33" x2="75" y2="33" stroke="#4f8ef7" stroke-width="0.8" opacity="0.3"/>
    <line x1="38" y1="10" x2="38" y2="38" stroke="#4f8ef7" stroke-width="0.8" opacity="0.3"/>
    <circle cx="25" cy="21" r="2" fill="#4f8ef7" opacity="0.6"/>
    <circle cx="25" cy="29" r="2" fill="#4f8ef7" opacity="0.6"/>
    <circle cx="55" cy="21" r="2" fill="#2dd4a0" opacity="0.6"/>
    <circle cx="55" cy="29" r="2" fill="#2dd4a0" opacity="0.6"/>
    <text x="45" y="52" font-family="-apple-system, sans-serif" font-size="8" fill="#4f8ef7" text-anchor="middle" opacity="0.8">Systems</text>
    <rect x="0" y="0" width="90" height="60" rx="10" fill="none" stroke="#4f8ef7" stroke-width="1" opacity="0">
      <animate attributeName="opacity" values="0;0.4;0" dur="3s" begin="1s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Clean Node 3: Automation/n8n -->
  <g transform="translate(390, 305)" filter="url(#glow)">
    <rect x="0" y="0" width="90" height="60" rx="10" fill="#13161b" stroke="#a78bfa" stroke-width="1.5"/>
    <!-- Automation/gear icon -->
    <g transform="translate(30, 22)">
      <!-- Lightning bolt for automation -->
      <polygon points="8,0 2,12 7,12 4,22 14,8 9,8" fill="none" stroke="#a78bfa" stroke-width="1.2" opacity="0.8"/>
      <!-- Loop arrow -->
      <path d="M22,6 A8,8 0 1,1 22,18" fill="none" stroke="#a78bfa" stroke-width="1" opacity="0.6"/>
      <polygon points="22,18 19,14 25,14" fill="#a78bfa" opacity="0.6"/>
    </g>
    <text x="45" y="52" font-family="-apple-system, sans-serif" font-size="8" fill="#a78bfa" text-anchor="middle" opacity="0.8">Automation</text>
    <rect x="0" y="0" width="90" height="60" rx="10" fill="none" stroke="#a78bfa" stroke-width="1" opacity="0">
      <animate attributeName="opacity" values="0;0.4;0" dur="3s" begin="2s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Connections between clean nodes (right side vertical links) -->
  <g opacity="0.4">
    <line x1="440" y1="175" x2="440" y2="210" stroke="#2dd4a0" stroke-width="1" stroke-dasharray="3,3">
      <animate attributeName="stroke-dashoffset" from="0" to="-12" dur="2s" repeatCount="indefinite"/>
    </line>
    <line x1="440" y1="270" x2="440" y2="305" stroke="#4f8ef7" stroke-width="1" stroke-dasharray="3,3">
      <animate attributeName="stroke-dashoffset" from="0" to="-12" dur="2s" repeatCount="indefinite"/>
    </line>
  </g>

  <!-- Floating particles -->
  <g>
    <circle cx="0" cy="0" r="2" fill="#4f8ef7" opacity="0.6" filter="url(#glow)">
      <animateMotion dur="4s" repeatCount="indefinite" path="M150,200 Q200,180 250,220 Q280,240 260,240"/>
    </circle>
    <circle cx="0" cy="0" r="2" fill="#2dd4a0" opacity="0.6" filter="url(#glow)">
      <animateMotion dur="3.5s" repeatCount="indefinite" path="M280,240 Q320,200 400,150 Q430,140 430,145"/>
    </circle>
    <circle cx="0" cy="0" r="1.5" fill="#a78bfa" opacity="0.5" filter="url(#glow)">
      <animateMotion dur="4.5s" repeatCount="indefinite" path="M270,250 Q330,300 400,340 Q430,350 430,335"/>
    </circle>
    <circle cx="0" cy="0" r="1.5" fill="#4f8ef7" opacity="0.4" filter="url(#glow)">
      <animateMotion dur="5s" repeatCount="indefinite" path="M100,280 Q160,260 220,245"/>
    </circle>
  </g>

  <!-- Subtle grid dots in background -->
  <g opacity="0.08">
    <pattern id="dots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="1" fill="#fff"/>
    </pattern>
    <rect x="0" y="60" width="520" height="400" fill="url(#dots)"/>
  </g>

  <!-- Checkmark indicators on clean side -->
  <g opacity="0.7">
    <circle cx="487" cy="145" r="8" fill="rgba(45,212,160,0.15)" stroke="#2dd4a0" stroke-width="1"/>
    <polyline points="483,145 486,148 491,142" fill="none" stroke="#2dd4a0" stroke-width="1.5"/>

    <circle cx="492" cy="240" r="8" fill="rgba(79,142,247,0.15)" stroke="#4f8ef7" stroke-width="1"/>
    <polyline points="488,240 491,243 496,237" fill="none" stroke="#4f8ef7" stroke-width="1.5"/>

    <circle cx="487" cy="335" r="8" fill="rgba(167,139,250,0.15)" stroke="#a78bfa" stroke-width="1"/>
    <polyline points="483,335 486,338 491,332" fill="none" stroke="#a78bfa" stroke-width="1.5"/>
  </g>
</svg>